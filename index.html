<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🃏 HiGH&LOW クイズ</title>
<meta name="description" content="みんなうろ覚えしてることをHiGH&LOWで当てるクイズゲーム！">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a1a;
  --card: #151530;
  --accent: #ff6b35;
  --accent2: #00e5ff;
  --high: #ff4081;
  --same: #ffeb3b;
  --low: #448aff;
  --success: #00e676;
  --fail: #ff1744;
  --text: #ffffff;
  --dim: #8888aa;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  padding: 20px;
}
.screen.active { display: flex; }

/* ===== Title Screen ===== */
#title-screen {
  gap: 14px;
  background: radial-gradient(ellipse at center, #1a1a3a 0%, var(--bg) 70%);
}

.game-logo {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: clamp(2.2rem, 8vw, 4.5rem);
  font-weight: 900;
  text-align: center;
  line-height: 1.2;
}
.logo-high {
  background: linear-gradient(135deg, var(--high), #ff8a80);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-and {
  color: var(--same);
  -webkit-text-fill-color: var(--same);
  font-size: 0.6em;
}
.logo-low {
  background: linear-gradient(135deg, var(--low), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.game-subtitle {
  color: var(--dim);
  font-size: clamp(0.85rem, 2.5vw, 1.1rem);
  text-align: center;
  margin-bottom: 2px;
}

/* Mode Selection */
.mode-select {
  display: flex;
  gap: 12px;
  margin: 4px 0;
}
.mode-btn {
  background: var(--card);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px 14px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  color: var(--text);
  font-family: inherit;
  flex: 1;
  max-width: 175px;
}
.mode-btn:active { transform: scale(0.95); }
.mode-endless { border-color: var(--accent); }
.mode-sprint { border-color: var(--accent2); }
.mode-icon { font-size: 2rem; margin-bottom: 4px; }
.mode-name { font-weight: 900; font-size: 1rem; margin-bottom: 4px; }
.mode-desc { font-size: 0.75rem; color: var(--dim); line-height: 1.4; }

.btn {
  padding: 16px 48px;
  font-size: 1.3rem;
  font-weight: 700;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn:active { transform: scale(0.95); }

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #ff8a50);
  color: #fff;
  box-shadow: 0 4px 20px rgba(255,107,53,0.4);
}
.btn-secondary {
  background: transparent;
  color: var(--accent2);
  border: 2px solid var(--accent2);
  padding: 12px 36px;
  font-size: 1rem;
}

.best-score-display {
  color: var(--accent2);
  font-size: 0.9rem;
  margin-top: 2px;
}

/* ===== Sound Toggle ===== */
.sound-toggle {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 100;
  background: rgba(255,255,255,0.08);
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== Countdown ===== */
.countdown-number {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: clamp(6rem, 20vw, 12rem);
  font-weight: 900;
  color: var(--accent2);
  text-shadow: 0 0 40px rgba(0,229,255,0.5);
}
@keyframes countPulse {
  0% { transform: scale(1.3); opacity: 0.5; }
  100% { transform: scale(1); opacity: 1; }
}

/* ===== Game Screen ===== */
#game-screen {
  justify-content: flex-start;
  padding-top: 10px;
  gap: 0;
}

.game-hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 480px;
  padding: 0 4px 6px;
  font-size: 0.9rem;
}
.hud-score { color: var(--accent2); font-weight: 700; }
.hud-combo { color: var(--accent); font-weight: 700; font-size: 0.85rem; }
.hud-progress { color: var(--dim); }
.hud-timer-display {
  color: var(--accent2);
  font-weight: 700;
  font-size: 0.85rem;
  font-variant-numeric: tabular-nums;
}

.timer-bar {
  width: 100%;
  max-width: 480px;
  height: 5px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  margin-bottom: 10px;
}
.timer-bar-fill {
  height: 100%;
  background: var(--accent2);
  border-radius: 3px;
  transition: width 0.05s linear;
}

.question-area {
  background: var(--card);
  border-radius: 20px;
  padding: 18px 20px;
  width: 100%;
  max-width: 480px;
  text-align: center;
  margin-bottom: 12px;
}
.q-category {
  font-size: 0.85rem;
  color: var(--dim);
  margin-bottom: 6px;
}
.q-main-text {
  font-size: clamp(1rem, 3.5vw, 1.3rem);
  font-weight: 700;
  margin-bottom: 10px;
  line-height: 1.4;
}
.q-ref-inline {
  font-size: clamp(0.85rem, 2.8vw, 1.05rem);
  color: var(--accent2);
  font-weight: 700;
  line-height: 1.5;
  padding: 8px 12px;
  background: rgba(0,229,255,0.08);
  border-radius: 10px;
  margin-bottom: 6px;
}
.q-hint {
  font-size: 0.8rem;
  color: var(--dim);
  margin-top: 6px;
}

/* ===== Choice Buttons ===== */
.choices-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 480px;
}
.choice-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px;
  border-radius: 14px;
  font-size: clamp(1.1rem, 3vw, 1.4rem);
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  border: 2px solid transparent;
  background: rgba(255,255,255,0.06);
}
.choice-btn:active { transform: scale(0.97); }
#btn-high { color: var(--high); border-color: rgba(255,64,129,0.25); }
#btn-same { color: var(--same); border-color: rgba(255,235,59,0.2); }
#btn-low  { color: var(--low); border-color: rgba(68,138,255,0.25); }

.choice-btn.correct {
  background: rgba(0,230,118,0.2);
  border-color: var(--success);
  color: var(--success);
}
.choice-btn.wrong {
  background: rgba(255,23,68,0.2);
  border-color: var(--fail);
  color: var(--fail);
}

.choice-icon { font-size: 1.2em; }
.choice-label { min-width: 70px; text-align: center; }

/* ===== Answer Reveal ===== */
.answer-reveal {
  position: fixed;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.93);
  border: 2px solid var(--accent2);
  border-radius: 20px;
  padding: 20px 32px;
  text-align: center;
  z-index: 20;
  animation: revealIn 0.35s ease-out;
  max-width: 90vw;
}
.answer-reveal.wrong-reveal {
  border-color: var(--fail);
}
@keyframes revealIn {
  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
.reveal-symbol { font-size: 2.5rem; margin-bottom: 6px; }
.reveal-value {
  font-size: clamp(1.1rem, 3vw, 1.4rem);
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
}
.reveal-label {
  font-size: clamp(0.85rem, 2.2vw, 1rem);
  color: var(--dim);
}

/* ===== Game Over Overlay ===== */
.gameover-text {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  font-weight: 900;
  color: var(--fail);
  margin-top: 8px;
  animation: goShake 0.4s ease-out;
}
@keyframes goShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* ===== Flash Overlay ===== */
.flash-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  animation: flashAnim 0.3s ease-out forwards;
}
@keyframes flashAnim {
  0% { opacity: 0.6; }
  100% { opacity: 0; }
}
.flash-correct { background: rgba(0,230,118,0.15); }
.flash-wrong { background: rgba(255,23,68,0.2); }

/* ===== Combo Popup ===== */
.combo-popup {
  position: fixed;
  top: 25%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2rem;
  font-weight: 900;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(255,107,53,0.6);
  pointer-events: none;
  z-index: 30;
  animation: comboUp 0.8s ease-out forwards;
}
@keyframes comboUp {
  0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.3); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(0.8); }
}

/* ===== Result Screen ===== */
#result-screen {
  gap: 10px;
}
.result-label {
  color: var(--dim);
  font-size: 1.1rem;
}
.result-score {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: clamp(3.5rem, 15vw, 6rem);
  font-weight: 900;
  color: var(--accent2);
  text-shadow: 0 0 30px rgba(0,229,255,0.4);
  line-height: 1;
}
.result-new-record {
  font-size: 1.5rem;
  color: var(--accent);
  font-weight: 700;
  animation: recordPulse 0.8s ease-in-out infinite alternate;
}
@keyframes recordPulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.1); }
}
.result-stats {
  color: var(--dim);
  font-size: 0.95rem;
  text-align: center;
  line-height: 1.6;
}
.result-gameover-label {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--fail);
  margin-bottom: -4px;
}
.result-clear-label {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--success);
  margin-bottom: -4px;
}
.name-input-area {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 4px;
}
#player-name {
  background: var(--card);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 1rem;
  color: var(--text);
  font-family: inherit;
  width: 160px;
  outline: none;
}
#player-name:focus { border-color: var(--accent2); }
.save-status {
  font-size: 0.85rem;
  min-height: 1.2em;
  text-align: center;
}
.result-buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
  margin-top: 4px;
}
.btn-share {
  background: #000;
  color: #fff;
  border: 2px solid #333;
  padding: 10px 28px;
  font-size: 1rem;
  border-radius: 60px;
  cursor: pointer;
  font-weight: 700;
  font-family: inherit;
  transition: all 0.2s;
}
.btn-share:active { transform: scale(0.95); }

/* ===== Ranking Screen ===== */
#ranking-screen {
  gap: 16px;
  padding: 20px;
  overflow-y: auto;
  justify-content: flex-start;
  padding-top: 40px;
}
.ranking-title {
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--accent2);
  margin-bottom: 8px;
}
.ranking-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.ranking-tab {
  padding: 8px 20px;
  border-radius: 20px;
  border: 2px solid rgba(255,255,255,0.15);
  background: transparent;
  color: var(--dim);
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.9rem;
}
.ranking-tab.active {
  background: var(--accent2);
  color: #000;
  border-color: var(--accent2);
}
.ranking-list {
  width: 100%;
  max-width: 400px;
}
.ranking-item {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 8px;
  gap: 12px;
}
.rank-num {
  font-size: 1.4rem;
  font-weight: 900;
  min-width: 40px;
  text-align: center;
}
.rank-1 { color: #ffd700; }
.rank-2 { color: #c0c0c0; }
.rank-3 { color: #cd7f32; }
.rank-name { flex: 1; font-weight: 700; }
.rank-score {
  color: var(--accent2);
  font-weight: 700;
  font-size: 1.1rem;
}
.rank-date {
  color: var(--dim);
  font-size: 0.75rem;
}
.ranking-loading {
  text-align: center;
  color: var(--dim);
  padding: 40px;
}
.ranking-loading .spinner {
  display: inline-block;
  width: 24px; height: 24px;
  border: 3px solid var(--dim);
  border-top-color: var(--accent2);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Sound Toggle -->
<button class="sound-toggle" id="sound-toggle" onclick="toggleSound()">🔊</button>

<!-- Title Screen -->
<div id="title-screen" class="screen active">
  <div class="game-logo">

    <span class="logo-high">HiGH</span><span class="logo-and">&</span><span class="logo-low">LOW</span>

<script>
// ========================================
// AUDIO ENGINE
// ========================================
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
  if (!soundEnabled) stopBGM();
}

// ========================================
// BGM ENGINE (Web Audio API procedural)
// ========================================
let bgmNodes = [];
let bgmInterval = null;
let bgmPlaying = false;

function startBGM() {
  if (!audioCtx || !soundEnabled || bgmPlaying) return;
  bgmPlaying = true;

  // Create a gain node for BGM master volume
  const masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0.07, audioCtx.currentTime);
  masterGain.connect(audioCtx.destination);
  bgmNodes.push(masterGain);

  // Bass line pattern (looping)
  const bassNotes = [130.81, 146.83, 164.81, 146.83, 130.81, 110.00, 123.47, 130.81]; // C3-D3-E3-D3-C3-A2-B2-C3
  let bassIdx = 0;
  const bpm = 128;
  const beatMs = 60000 / bpm;

  function playBeat() {
    if (!bgmPlaying || !audioCtx) return;
    const now = audioCtx.currentTime;

    // Bass (sub)
    const bassOsc = audioCtx.createOscillator();
    const bassGain = audioCtx.createGain();
    bassOsc.type = 'sine';
    bassOsc.frequency.setValueAtTime(bassNotes[bassIdx % bassNotes.length], now);
    bassGain.gain.setValueAtTime(0.5, now);
    bassGain.gain.exponentialRampToValueAtTime(0.01, now + beatMs / 1000 * 0.9);
    bassOsc.connect(bassGain).connect(masterGain);
    bassOsc.start(now);
    bassOsc.stop(now + beatMs / 1000);

    // Hi-hat (noise burst) on every beat
    const bufferSize = audioCtx.sampleRate * 0.03;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noiseSrc = audioCtx.createBufferSource();
    noiseSrc.buffer = noiseBuffer;
    const hihatGain = audioCtx.createGain();
    const hihatFilter = audioCtx.createBiquadFilter();
    hihatFilter.type = 'highpass';
    hihatFilter.frequency.setValueAtTime(8000, now);
    hihatGain.gain.setValueAtTime(0.3, now);
    hihatGain.gain.exponentialRampToValueAtTime(0.01, now + 0.03);
    noiseSrc.connect(hihatFilter).connect(hihatGain).connect(masterGain);
    noiseSrc.start(now);

    // Chord pad every 4 beats
    if (bassIdx % 4 === 0) {
      const chordFreqs = bassIdx % 8 < 4
        ? [261.63, 329.63, 392.00]  // C major
        : [220.00, 277.18, 329.63]; // A minor
      chordFreqs.forEach(freq => {
        const padOsc = audioCtx.createOscillator();
        const padGain = audioCtx.createGain();
        padOsc.type = 'triangle';
        padOsc.frequency.setValueAtTime(freq, now);
        padGain.gain.setValueAtTime(0.15, now);
        padGain.gain.setValueAtTime(0.15, now + beatMs * 3.5 / 1000);
        padGain.gain.exponentialRampToValueAtTime(0.001, now + beatMs * 4 / 1000);
        padOsc.connect(padGain).connect(masterGain);
        padOsc.start(now);
        padOsc.stop(now + beatMs * 4 / 1000);
      });
    }

    // Kick on beats 0,2 (every 2 beats)
    if (bassIdx % 2 === 0) {
      const kickOsc = audioCtx.createOscillator();
      const kickGain = audioCtx.createGain();
      kickOsc.type = 'sine';
      kickOsc.frequency.setValueAtTime(150, now);
      kickOsc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
      kickGain.gain.setValueAtTime(0.6, now);
      kickGain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      kickOsc.connect(kickGain).connect(masterGain);
      kickOsc.start(now);
      kickOsc.stop(now + 0.15);
    }

    bassIdx++;
  }

  playBeat();
  bgmInterval = setInterval(playBeat, beatMs);
}

function stopBGM() {
  bgmPlaying = false;
  if (bgmInterval) {
    clearInterval(bgmInterval);
    bgmInterval = null;
  }
  bgmNodes.forEach(n => { try { n.disconnect(); } catch(e) {} });
  bgmNodes = [];
}

function playSE(type) {
  if (!soundEnabled || !audioCtx) return;
  const now = audioCtx.currentTime;

  if (type === 'correct') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, now);
    osc.frequency.linearRampToValueAtTime(880, now + 0.08);
    osc.frequency.linearRampToValueAtTime(1100, now + 0.15);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.25);
  } else if (type === 'wrong') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.linearRampToValueAtTime(100, now + 0.3);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.35);
  } else if (type === 'countdown') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, now);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.15);
  } else if (type === 'go') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1047, now);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.3);
  } else if (type === 'combo') {
    [523, 659, 784].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + i * 0.06);
      gain.gain.setValueAtTime(0.12, now + i * 0.06);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.06); osc.stop(now + i * 0.06 + 0.15);
    });
  } else if (type === 'newrecord') {
    [523, 659, 784, 1047, 784, 1047, 1319].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = i % 2 === 0 ? 'sine' : 'triangle';
      osc.frequency.setValueAtTime(freq, now + i * 0.1);
      gain.gain.setValueAtTime(0.18, now + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.25);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.25);
    });
  } else if (type === 'click') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, now);
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.06);
  } else if (type === 'reveal') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(440, now);
    osc.frequency.linearRampToValueAtTime(660, now + 0.15);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.2);
  } else if (type === 'gameover') {
    [300, 250, 200, 150].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, now + i * 0.15);
      gain.gain.setValueAtTime(0.15, now + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.2);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 0.2);
    });
  }
}

// ========================================
// GAME STATE
// ========================================
const SPRINT_QUESTIONS = 10;
let gameMode = 'endless'; // 'endless' or 'sprint'
let score = 0, combo = 0, maxCombo = 0, correctCount = 0, questionNum = 0;
let currentCorrectAnswer = null;
let currentQuestion = null;
let questionTimeout = null;
let timerInterval = null;
let gameActive = false;
let usedQuestionIndices = [];
let questionStartTime = 0;  // ms timestamp when question appeared
let currentTimeLimit = 0;   // ms time limit for current question
let sprintTotalTime = 0;    // accumulated time for sprint mode (ms)
let gameStartTimestamp = 0;  // when the game started

// ========================================
// SCREENS
// ========================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showTitle() {
  stopBGM();
  showScreen('title-screen');
  const bestEndless = getBestScore('endless');
  const bestSprint = getBestScore('sprint');
  const parts = [];
  if (bestEndless > 0) parts.push(`🔥 エンドレス: ${bestEndless}pt`);
  if (bestSprint > 0) parts.push(`⚡ スプリント: ${bestSprint}pt`);
  document.getElementById('best-score-display').textContent = parts.join('　');
}

// ========================================
// GAME LOGIC
// ========================================
function startGame(mode) {
  initAudio();
  gameMode = mode;
  score = 0; combo = 0; maxCombo = 0; correctCount = 0; questionNum = 0;
  sprintTotalTime = 0;
  gameActive = false;
  usedQuestionIndices = [];
  showScreen('countdown-screen');
  doCountdown(3);
}

function retryGame() {
  startGame(gameMode);
}

function doCountdown(n) {
  if (n <= 0) {
    playSE('go');
    gameActive = true;
    gameStartTimestamp = Date.now();
    showScreen('game-screen');
    startBGM();
    nextQuestion();
    return;
  }
  const el = document.getElementById('countdown-num');
  el.textContent = n;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'countPulse 0.6s ease-out';
  playSE('countdown');
  setTimeout(() => doCountdown(n - 1), 800);
}

function pickQuestion() {
  const available = [];
  for (let i = 0; i < questions.length; i++) {
    if (!usedQuestionIndices.includes(i)) available.push(i);
  }
  if (available.length === 0) {
    usedQuestionIndices = [];
    for (let i = 0; i < questions.length; i++) available.push(i);
  }
  const idx = available[Math.floor(Math.random() * available.length)];
  usedQuestionIndices.push(idx);
  return questions[idx];
}

function getTimeLimit() {
  if (gameMode === 'sprint') {
    return 8000; // constant 8 seconds
  }
  // Endless: start at 10s, decrease to 5s over 20 questions
  const minTime = 5000;
  const maxTime = 10000;
  const decay = (maxTime - minTime) / 20;
  return Math.max(minTime, maxTime - questionNum * decay);
}

function nextQuestion() {
  if (!gameActive) return;

  // Sprint mode: check if all questions answered
  if (gameMode === 'sprint' && questionNum >= SPRINT_QUESTIONS) {
    gameActive = false;
    setTimeout(() => showResult(true), 300);
    return;
  }

  questionNum++;
  const q = pickQuestion();
  currentQuestion = q;

  // Determine correct answer
  if (q.askValue > q.refValue) {
    currentCorrectAnswer = 'high';
  } else if (q.askValue < q.refValue) {
    currentCorrectAnswer = 'low';
  } else {
    currentCorrectAnswer = 'same';
  }

  // Update button labels based on comparison type
  const labels = COMP_LABELS[q.comp] || { high: 'ハイ', low: 'ロー', same: '同じ' };
  document.getElementById('label-high').textContent = labels.high;
  document.getElementById('label-same').textContent = labels.same;
  document.getElementById('label-low').textContent = labels.low;

  // Update HUD
  if (gameMode === 'endless') {
    document.getElementById('hud-score-area').innerHTML = `スコア: <span id="hud-score">${score}</span>`;
    document.getElementById('hud-progress').textContent = `Q${questionNum}`;
  } else {
    document.getElementById('hud-score-area').innerHTML = `スコア: <span id="hud-score">${score}</span>`;
    document.getElementById('hud-progress').textContent = `Q${questionNum} / ${SPRINT_QUESTIONS}`;
  }
  document.getElementById('hud-combo').textContent = combo > 1 ? `🔥 ${combo}コンボ` : '';

  // Update question display
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-main-text').textContent = q.question;
  const refDisplay = q.refName + '（' + q.refValue + (q.unit || '') + '）より…';
  document.getElementById('q-ref-inline').textContent = refDisplay;
  document.getElementById('q-hint').textContent = '💡 ' + q.hint;

  // Reset buttons
  ['high', 'same', 'low'].forEach(a => {
    const btn = document.getElementById('btn-' + a);
    btn.classList.remove('correct', 'wrong');
  });

  // Remove any old answer reveal or gameover text
  document.querySelectorAll('.answer-reveal').forEach(e => e.remove());
  document.querySelectorAll('.gameover-text').forEach(e => e.remove());

  // Timer
  const timeLimit = getTimeLimit();
  currentTimeLimit = timeLimit;
  let timeLeft = timeLimit;
  const timerFill = document.getElementById('timer-bar-fill');
  timerFill.style.width = '100%';
  timerFill.style.background = 'var(--accent2)';

  clearInterval(timerInterval);
  clearTimeout(questionTimeout);

  questionStartTime = Date.now();

  timerInterval = setInterval(() => {
    timeLeft -= 50;
    const pct = Math.max(0, timeLeft / timeLimit * 100);
    timerFill.style.width = pct + '%';
    if (pct < 30) timerFill.style.background = 'var(--fail)';
    else if (pct < 60) timerFill.style.background = 'var(--accent)';
    else timerFill.style.background = 'var(--accent2)';
  }, 50);

  questionTimeout = setTimeout(() => onTimeout(), timeLimit);
}

function handleAnswer(answer) {
  if (!gameActive || !currentCorrectAnswer) return;
  clearTimeout(questionTimeout);
  clearInterval(timerInterval);

  const isCorrect = answer === currentCorrectAnswer;
  const btn = document.getElementById('btn-' + answer);
  const q = currentQuestion;
  const answerTime = Date.now() - questionStartTime; // ms taken to answer

  if (isCorrect) {
    correctCount++;
    combo++;
    if (combo > maxCombo) maxCombo = combo;

    // Calculate score based on mode
    if (gameMode === 'endless') {
      const baseScore = 100;
      const timeBonus = Math.floor((1 - answerTime / currentTimeLimit) * 100);
      const comboBonus = Math.min(combo * 15, 150);
      score += baseScore + Math.max(0, timeBonus) + comboBonus;
    } else {
      // Sprint: score = remaining time points (max 1000 per question)
      const timeScore = Math.floor((1 - answerTime / currentTimeLimit) * 1000);
      score += Math.max(0, timeScore);
      sprintTotalTime += answerTime;
    }

    btn.classList.add('correct');
    showFlash('correct');
    playSE('correct');
    showAnswerReveal(q, true);

    if (combo > 0 && combo % 5 === 0) {
      showComboPopup(`${combo}コンボ!`);
      playSE('combo');
    } else if (combo === 3) {
      showComboPopup('🔥');
      playSE('combo');
    }

    currentCorrectAnswer = null;
    setTimeout(() => nextQuestion(), 1200);
  } else {
    // GAME OVER
    gameActive = false;
    combo = 0;
    btn.classList.add('wrong');
    document.getElementById('btn-' + currentCorrectAnswer).classList.add('correct');
    showFlash('wrong');
    playSE('wrong');
    showAnswerReveal(q, false);

    // Show game over text on game screen
    const goDiv = document.createElement('div');
    goDiv.className = 'gameover-text';
    goDiv.textContent = 'GAME OVER';
    document.getElementById('game-screen').appendChild(goDiv);
    playSE('gameover');

    currentCorrectAnswer = null;
    setTimeout(() => showResult(false), 2000);
  }
}

function onTimeout() {
  clearInterval(timerInterval);
  // GAME OVER on timeout
  gameActive = false;
  combo = 0;

  showFlash('wrong');
  playSE('wrong');

  const q = currentQuestion;
  document.getElementById('btn-' + currentCorrectAnswer).classList.add('correct');
  showAnswerReveal(q, false);

  const goDiv = document.createElement('div');
  goDiv.className = 'gameover-text';
  goDiv.textContent = 'TIME UP!';
  document.getElementById('game-screen').appendChild(goDiv);
  playSE('gameover');

  currentCorrectAnswer = null;
  setTimeout(() => showResult(false), 2000);
}

function showAnswerReveal(q, isCorrect) {
  const div = document.createElement('div');
  div.className = 'answer-reveal' + (isCorrect ? '' : ' wrong-reveal');
  const symbol = isCorrect ? '⭕' : '❌';
  div.innerHTML = `<div class="reveal-symbol">${symbol}</div><div class="reveal-value">${q.askLabel}: ${q.askValue}${q.unit || ''}</div><div class="reveal-label">${q.refName}: ${q.refValue}${q.unit || ''}</div>`;
  document.getElementById('game-screen').appendChild(div);
  playSE('reveal');
}

function showFlash(type) {
  const div = document.createElement('div');
  div.className = `flash-overlay flash-${type}`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 300);
}

function showComboPopup(text) {
  const div = document.createElement('div');
  div.className = 'combo-popup';
  div.textContent = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 800);
}

// ========================================
// RESULTS
// ========================================
function showResult(cleared) {
  stopBGM();
  showScreen('result-screen');

  const statusLabel = document.getElementById('result-status-label');
  if (gameMode === 'sprint' && cleared) {
    statusLabel.className = 'result-clear-label';
    statusLabel.textContent = '🎉 全問正解！';
  } else if (!cleared) {
    statusLabel.className = 'result-gameover-label';
    statusLabel.textContent = 'GAME OVER';
  } else {
    statusLabel.className = '';
    statusLabel.textContent = '';
  }

  document.getElementById('result-label').textContent = 'スコア';
  document.getElementById('result-score').textContent = score;

  // Stats
  let statsHtml = '';
  if (gameMode === 'endless') {
    statsHtml = `正解数: ${correctCount}<br>最大コンボ: ${maxCombo}`;
  } else {
    const totalMs = cleared ? sprintTotalTime : (Date.now() - gameStartTimestamp);
    const totalSec = (totalMs / 1000).toFixed(2);
    if (cleared) {
      statsHtml = `クリアタイム: ${totalSec}秒<br>最大コンボ: ${maxCombo}`;
    } else {
      statsHtml = `到達: Q${correctCount + 1} / ${SPRINT_QUESTIONS}<br>正解数: ${correctCount}<br>最大コンボ: ${maxCombo}`;
    }
  }
  document.getElementById('result-stats').innerHTML = statsHtml;

  const best = getBestScore(gameMode);
  if (score > best && score > 0) {
    document.getElementById('result-new-record').style.display = 'block';
    playSE('newrecord');
  } else {
    document.getElementById('result-new-record').style.display = 'none';
  }

  const lastName = localStorage.getItem('halLastName') || '';
  document.getElementById('player-name').value = lastName;
  document.getElementById('save-status').textContent = '';
  document.getElementById('save-btn').disabled = false;
  document.getElementById('save-btn').textContent = '保存';
}

async function supabaseFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...options.headers,
    },
  });
  if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

let currentRankingTab = 'global';

function getLocalRankings() {
  try { return JSON.parse(localStorage.getItem('halRankings') || '[]'); }
  catch { return []; }
}

function getBestScore(mode) {
  const rankings = getLocalRankings();
  const filtered = mode ? rankings.filter(r => r.mode === mode) : rankings;
  return filtered.length > 0 ? Math.max(...filtered.map(r => r.score)) : 0;
}

async function saveScore() {
  initAudio();
  playSE('click');
  const name = document.getElementById('player-name').value.trim() || 'プレイヤー';
  localStorage.setItem('halLastName', name);

  const saveBtn = document.getElementById('save-btn');
  const statusEl = document.getElementById('save-status');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';
  statusEl.textContent = '';

  // localStorage
  const rankings = getLocalRankings();
  rankings.push({
    name, score, correct: correctCount, maxCombo,
    mode: gameMode,
    date: new Date().toLocaleDateString('ja-JP'),
  });
  rankings.sort((a, b) => b.score - a.score);
  if (rankings.length > 50) rankings.length = 50;
  localStorage.setItem('halRankings', JSON.stringify(rankings));

  // Supabase
  try {
    await supabaseFetch('high_and_low_scores', {
      method: 'POST',
      prefer: 'return=minimal',
      body: JSON.stringify({
        name,
        score,
        combo: maxCombo,
        questions: correctCount,
      }),
    });
    statusEl.textContent = '✅ グローバルランキングに保存しました！';
    statusEl.style.color = 'var(--success)';
  } catch (e) {
    console.error('Supabase save error:', e);
    statusEl.textContent = '⚠️ オンライン保存に失敗（ローカルには保存済み）';
    statusEl.style.color = 'var(--accent)';
  }

  saveBtn.disabled = false;
  saveBtn.textContent = '保存';
}

  }
});
