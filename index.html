<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🃏 HiGH&LOW クイズ</title>
<meta name="description" content="みんなうろ覚えしてることをHiGH&LOWで当てるクイズゲーム！">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a1a;
  --card: #151530;
  --accent: #ff6b35;
  --accent2: #00e5ff;
  --high: #ff4081;
  --same: #ffeb3b;
  --low: #448aff;
  --success: #00e676;
  --fail: #ff1744;
  --text: #ffffff;
  --dim: #8888aa;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  padding: 20px;
}
.screen.active { display: flex; }

/* ===== Title Screen ===== */
#title-screen {
  gap: 16px;
  background: radial-gradient(ellipse at center, #1a1a3a 0%, var(--bg) 70%);
}

.game-logo {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: clamp(2.2rem, 8vw, 4.5rem);
  font-weight: 900;
  text-align: center;
  line-height: 1.2;
}
.logo-high {
  background: linear-gradient(135deg, var(--high), #ff8a80);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-and {
  color: var(--same);
  -webkit-text-fill-color: var(--same);
  font-size: 0.6em;
}
.logo-low {
  background: linear-gradient(135deg, var(--low), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.game-subtitle {
  color: var(--dim);
  font-size: clamp(0.85rem, 2.5vw, 1.1rem);
  text-align: center;
  margin-bottom: 6px;
}

.btn {
  padding: 16px 48px;
  font-size: 1.3rem;
  font-weight: 700;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn:active { transform: scale(0.95); }

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #ff8a50);
  color: #fff;
  box-shadow: 0 4px 20px rgba(255,107,53,0.4);
}
.btn-secondary {
  background: transparent;
  color: var(--accent2);
  border: 2px solid var(--accent2);
  padding: 12px 36px;
  font-size: 1rem;
}

.best-score-display {
  color: var(--accent2);
  font-size: 1rem;
  margin-top: 4px;
}

/* ===== Sound Toggle ===== */
.sound-toggle {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 200;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text);
  font-size: 1.4rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sound-toggle:active { transform: scale(0.9); }

/* ===== Countdown ===== */
#countdown-screen { background: var(--bg); }
.countdown-number {
  font-size: clamp(8rem, 30vw, 16rem);
  font-weight: 900;
  animation: countPulse 0.6s ease-out;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
@keyframes countPulse {
  0% { transform: scale(2); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* ===== Game Screen ===== */
#game-screen {
  padding: 0;
  position: relative;
  background: var(--bg);
  gap: 0;
}

.game-hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: rgba(0,0,0,0.5);
  z-index: 10;
  font-size: clamp(0.8rem, 2vw, 0.95rem);
}
.hud-score { color: var(--accent); font-weight: 700; }
.hud-combo { color: var(--accent2); font-weight: 700; }
.hud-progress { color: var(--dim); font-weight: 700; }

.timer-bar {
  position: absolute;
  top: 44px; left: 0; right: 0;
  height: 4px;
  background: rgba(255,255,255,0.1);
  z-index: 10;
}
.timer-bar-fill {
  height: 100%;
  background: var(--accent2);
  transition: width 0.05s linear;
}

.question-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 52px 16px 8px;
  width: 100%;
  gap: 6px;
}

.q-category {
  font-size: clamp(0.75rem, 2vw, 0.9rem);
  color: var(--dim);
  background: rgba(255,255,255,0.06);
  padding: 4px 14px;
  border-radius: 20px;
}

.q-main-text {
  font-size: clamp(1rem, 3.2vw, 1.6rem);
  font-weight: 700;
  text-align: center;
  line-height: 1.4;
  color: var(--text);
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.q-compare {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 8px 0;
}

.q-value-box {
  background: var(--card);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 12px 20px;
  text-align: center;
  min-width: 100px;
}
.q-value-label {
  font-size: clamp(0.7rem, 1.8vw, 0.85rem);
  color: var(--dim);
  margin-bottom: 4px;
}
.q-value-num {
  font-size: clamp(1.6rem, 5vw, 2.5rem);
  font-weight: 900;
  color: var(--accent2);
}
.q-value-unknown .q-value-num {
  background: linear-gradient(135deg, var(--high), var(--low));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.q-vs {
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  font-weight: 900;
  color: var(--same);
}

.q-hint {
  font-size: clamp(0.75rem, 2vw, 0.9rem);
  color: var(--dim);
  text-align: center;
  margin-top: 4px;
}

/* ===== 3-Choice Buttons ===== */
.choices-row {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 420px;
  padding: 0 8px 20px;
}

.choice-btn {
  flex: 1;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  background: var(--card);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 8px;
  cursor: pointer;
  transition: all 0.12s;
  -webkit-tap-highlight-color: transparent;
  gap: 4px;
}
.choice-btn:active { transform: scale(0.92); }

.choice-icon {
  font-size: clamp(1.8rem, 6vw, 2.8rem);
}
.choice-label {
  font-size: clamp(0.85rem, 2.2vw, 1.1rem);
  font-weight: 900;
}

.choice-btn[data-answer="high"] {
  border-color: rgba(255,64,129,0.4);
}
.choice-btn[data-answer="high"] .choice-icon { color: var(--high); }
.choice-btn[data-answer="high"] .choice-label { color: var(--high); }

.choice-btn[data-answer="same"] {
  border-color: rgba(255,235,59,0.4);
}
.choice-btn[data-answer="same"] .choice-icon { color: var(--same); }
.choice-btn[data-answer="same"] .choice-label { color: var(--same); }

.choice-btn[data-answer="low"] {
  border-color: rgba(68,138,255,0.4);
}
.choice-btn[data-answer="low"] .choice-icon { color: var(--low); }
.choice-btn[data-answer="low"] .choice-label { color: var(--low); }

.choice-btn.correct {
  background: var(--success) !important;
  border-color: var(--success) !important;
}
.choice-btn.correct .choice-icon,
.choice-btn.correct .choice-label { color: #fff !important; }

.choice-btn.wrong {
  background: var(--fail) !important;
  border-color: var(--fail) !important;
}
.choice-btn.wrong .choice-icon,
.choice-btn.wrong .choice-label { color: #fff !important; }

/* Answer reveal */
.answer-reveal {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 10px 20px;
  font-size: clamp(0.9rem, 2.5vw, 1.1rem);
  font-weight: 700;
  color: var(--accent2);
  text-align: center;
  z-index: 20;
  animation: revealIn 0.3s ease-out;
  white-space: nowrap;
}
@keyframes revealIn {
  0% { transform: translateX(-50%) translateY(10px); opacity: 0; }
  100% { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* Flash overlay */
.flash-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 100;
  animation: flash 0.3s ease-out forwards;
}
.flash-correct { background: rgba(0,230,118,0.25); }
.flash-wrong { background: rgba(255,23,68,0.4); }
@keyframes flash {
  0% { opacity: 1; } 100% { opacity: 0; }
}

/* Combo popup */
.combo-popup {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: clamp(2rem, 8vw, 4rem);
  font-weight: 900;
  pointer-events: none;
  z-index: 50;
  animation: comboAnim 0.8s ease-out forwards;
  color: var(--accent2);
  text-shadow: 0 0 30px rgba(0,229,255,0.6);
}
@keyframes comboAnim {
  0% { transform: translate(-50%,-50%) scale(0.5); opacity: 0; }
  30% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
  100% { transform: translate(-50%,-80%) scale(1); opacity: 0; }
}

/* ===== Result Screen ===== */
#result-screen {
  gap: 12px;
  background: radial-gradient(ellipse at center, #1a1a3a 0%, var(--bg) 70%);
}
.result-label { font-size: 1.2rem; color: var(--dim); }
.result-score {
  font-size: clamp(3.5rem, 14vw, 7rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.result-stats {
  text-align: center;
  color: var(--dim);
  line-height: 2;
  font-size: 1rem;
}
.result-new-record {
  color: var(--accent);
  font-weight: 700;
  font-size: 1.2rem;
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

.name-input-area {
  display: flex;
  gap: 8px;
  margin-top: 4px;
  width: 100%;
  max-width: 300px;
}
.name-input-area input {
  flex: 1;
  padding: 12px 16px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.2);
  background: var(--card);
  color: var(--text);
  font-size: 1rem;
  font-family: inherit;
  outline: none;
}
.name-input-area input:focus { border-color: var(--accent2); }

.save-status {
  font-size: 0.85rem;
  margin-top: 2px;
  min-height: 20px;
}

.result-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  margin-top: 4px;
}

.btn-share {
  background: #000;
  color: #fff;
  border: 2px solid #333;
  padding: 12px 36px;
  font-size: 1rem;
  border-radius: 60px;
  cursor: pointer;
  font-weight: 700;
  font-family: inherit;
  transition: all 0.2s;
}
.btn-share:active { transform: scale(0.95); }

/* ===== Ranking Screen ===== */
#ranking-screen {
  gap: 16px;
  padding: 20px;
  overflow-y: auto;
  justify-content: flex-start;
  padding-top: 40px;
}
.ranking-title {
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--accent2);
  margin-bottom: 8px;
}
.ranking-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.ranking-tab {
  padding: 8px 20px;
  border-radius: 20px;
  border: 2px solid rgba(255,255,255,0.15);
  background: transparent;
  color: var(--dim);
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.9rem;
}
.ranking-tab.active {
  background: var(--accent2);
  color: #000;
  border-color: var(--accent2);
}
.ranking-list {
  width: 100%;
  max-width: 400px;
}
.ranking-item {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 8px;
  gap: 12px;
}
.rank-num {
  font-size: 1.4rem;
  font-weight: 900;
  min-width: 40px;
  text-align: center;
}
.rank-1 { color: #ffd700; }
.rank-2 { color: #c0c0c0; }
.rank-3 { color: #cd7f32; }
.rank-name { flex: 1; font-weight: 700; }
.rank-score {
  color: var(--accent2);
  font-weight: 700;
  font-size: 1.1rem;
}
.rank-date {
  color: var(--dim);
  font-size: 0.75rem;
}
.ranking-loading {
  text-align: center;
  color: var(--dim);
  padding: 40px;
}
.ranking-loading .spinner {
  display: inline-block;
  width: 24px; height: 24px;
  border: 3px solid var(--dim);
  border-top-color: var(--accent2);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Sound Toggle -->
<button class="sound-toggle" id="sound-toggle" onclick="toggleSound()">🔊</button>

<!-- Title Screen -->
<div id="title-screen" class="screen active">
  <div class="game-logo">
    🃏<br>
    <span class="logo-high">HiGH</span><span class="logo-and">&</span><span class="logo-low">LOW</span>
  </div>
  <div class="game-subtitle">みんなが うろ覚えしてることを<br>ハイ＆ローで当てろ！</div>
  <button class="btn btn-primary" onclick="startGame()">スタート</button>
  <button class="btn btn-secondary" onclick="showRanking()">🏆 ランキング</button>
  <div class="best-score-display" id="best-score-display"></div>
</div>

<!-- Countdown Screen -->
<div id="countdown-screen" class="screen">
  <div class="countdown-number" id="countdown-num">3</div>
</div>

<!-- Game Screen -->
<div id="game-screen" class="screen">
  <div class="game-hud">
    <div class="hud-score">スコア: <span id="hud-score">0</span></div>
    <div class="hud-combo" id="hud-combo"></div>
    <div class="hud-progress" id="hud-progress">Q1 / 15</div>
  </div>
  <div class="timer-bar"><div class="timer-bar-fill" id="timer-bar-fill"></div></div>

  <div class="question-area">
    <div class="q-category" id="q-category">カテゴリ</div>
    <div class="q-main-text" id="q-main-text">問題文</div>
    <div class="q-compare">
      <div class="q-value-box">
        <div class="q-value-label" id="q-ref-label">基準</div>
        <div class="q-value-num" id="q-ref-value">100</div>
      </div>
      <div class="q-vs">VS</div>
      <div class="q-value-box q-value-unknown">
        <div class="q-value-label" id="q-ask-label">???</div>
        <div class="q-value-num" id="q-ask-value">？</div>
      </div>
    </div>
    <div class="q-hint" id="q-hint"></div>
  </div>

  <div class="choices-row">
    <div class="choice-btn" data-answer="high" id="btn-high">
      <span class="choice-icon">⬆</span>
      <span class="choice-label">ハイ</span>
    </div>
    <div class="choice-btn" data-answer="same" id="btn-same">
      <span class="choice-icon">＝</span>
      <span class="choice-label">同じ</span>
    </div>
    <div class="choice-btn" data-answer="low" id="btn-low">
      <span class="choice-icon">⬇</span>
      <span class="choice-label">ロー</span>
    </div>
  </div>
</div>

<!-- Result Screen -->
<div id="result-screen" class="screen">
  <div class="result-label">スコア</div>
  <div class="result-score" id="result-score">0</div>
  <div id="result-new-record" class="result-new-record" style="display:none">🎉 NEW RECORD!</div>
  <div class="result-stats" id="result-stats"></div>
  <div class="name-input-area" id="name-input-area">
    <input type="text" id="player-name" placeholder="名前を入力" maxlength="10">
    <button class="btn btn-primary" style="padding:12px 24px;font-size:1rem" id="save-btn" onclick="saveScore()">保存</button>
  </div>
  <div class="save-status" id="save-status"></div>
  <div class="result-buttons">
    <button class="btn-share" onclick="shareOnX()">𝕏 でシェア</button>
    <button class="btn btn-primary" onclick="startGame()" style="padding:12px 36px;font-size:1rem">もう一回</button>
    <button class="btn btn-secondary" onclick="showRanking()">🏆 ランキング</button>
    <button class="btn btn-secondary" onclick="showTitle()">タイトルへ</button>
  </div>
</div>

<!-- Ranking Screen -->
<div id="ranking-screen" class="screen">
  <div class="ranking-title">🏆 ランキング</div>
  <div class="ranking-tabs">
    <button class="ranking-tab active" id="tab-global" onclick="switchRankingTab('global')">🌍 全員</button>
    <button class="ranking-tab" id="tab-local" onclick="switchRankingTab('local')">📱 自分</button>
  </div>
  <div class="ranking-list" id="ranking-list"></div>
  <button class="btn btn-secondary" onclick="showTitle()" style="margin-top:16px">戻る</button>
</div>

<script>
// ========================================
// AUDIO ENGINE
// ========================================
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
}

function playSE(type) {
  if (!soundEnabled || !audioCtx) return;
  const now = audioCtx.currentTime;

  if (type === 'correct') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, now);
    osc.frequency.linearRampToValueAtTime(880, now + 0.08);
    osc.frequency.linearRampToValueAtTime(1100, now + 0.15);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.25);

    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(880, now + 0.03);
    osc2.frequency.linearRampToValueAtTime(1320, now + 0.15);
    gain2.gain.setValueAtTime(0.12, now + 0.03);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc2.connect(gain2).connect(audioCtx.destination);
    osc2.start(now + 0.03); osc2.stop(now + 0.3);
  } else if (type === 'wrong') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.linearRampToValueAtTime(100, now + 0.3);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.35);
  } else if (type === 'countdown') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, now);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.2);
  } else if (type === 'go') {
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + i * 0.06);
      gain.gain.setValueAtTime(0.2, now + i * 0.06);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.3);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.06); osc.stop(now + i * 0.06 + 0.3);
    });
  } else if (type === 'combo') {
    [1200, 1500, 1800].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + i * 0.05);
      gain.gain.setValueAtTime(0.12, now + i * 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.2);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.05); osc.stop(now + i * 0.05 + 0.2);
    });
  } else if (type === 'newrecord') {
    [523, 659, 784, 1047, 784, 1047, 1319].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = i % 2 === 0 ? 'sine' : 'triangle';
      osc.frequency.setValueAtTime(freq, now + i * 0.1);
      gain.gain.setValueAtTime(0.18, now + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.25);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.25);
    });
  } else if (type === 'click') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, now);
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.06);
  } else if (type === 'reveal') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(440, now);
    osc.frequency.linearRampToValueAtTime(660, now + 0.15);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.2);
  }
}

// ========================================
// GAME STATE
// ========================================
const TOTAL_QUESTIONS = 15;
let score = 0, combo = 0, maxCombo = 0, correctCount = 0, questionNum = 0;
let currentCorrectAnswer = null;
let currentQuestion = null;
let questionTimeout = null;
let timerInterval = null;
let gameActive = false;
let usedQuestionIndices = [];

// ========================================
// SCREENS
// ========================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showTitle() {
  showScreen('title-screen');
  const best = getBestScore();
  document.getElementById('best-score-display').textContent = best > 0 ? `ベストスコア: ${best}` : '';
}

// ========================================
// GAME LOGIC
// ========================================
function startGame() {
  initAudio();
  score = 0; combo = 0; maxCombo = 0; correctCount = 0; questionNum = 0;
  gameActive = false;
  usedQuestionIndices = [];
  showScreen('countdown-screen');
  doCountdown(3);
}

function doCountdown(n) {
  if (n <= 0) {
    playSE('go');
    gameActive = true;
    showScreen('game-screen');
    nextQuestion();
    return;
  }
  const el = document.getElementById('countdown-num');
  el.textContent = n;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'countPulse 0.6s ease-out';
  playSE('countdown');
  setTimeout(() => doCountdown(n - 1), 800);
}

function pickQuestion() {
  const available = [];
  for (let i = 0; i < questions.length; i++) {
    if (!usedQuestionIndices.includes(i)) available.push(i);
  }
  if (available.length === 0) {
    // Reset if we've used all questions
    usedQuestionIndices = [];
    for (let i = 0; i < questions.length; i++) available.push(i);
  }
  const idx = available[Math.floor(Math.random() * available.length)];
  usedQuestionIndices.push(idx);
  return questions[idx];
}

function getTimeLimit() {
  // Start at 12s, decrease to 6s
  const minTime = 6000;
  const maxTime = 12000;
  const decay = (maxTime - minTime) / TOTAL_QUESTIONS;
  return Math.max(minTime, maxTime - questionNum * decay);
}

function nextQuestion() {
  if (!gameActive) return;

  if (questionNum >= TOTAL_QUESTIONS) {
    gameActive = false;
    setTimeout(() => showResult(), 300);
    return;
  }

  questionNum++;
  const q = pickQuestion();
  currentQuestion = q;

  // Determine correct answer
  if (q.askValue > q.refValue) {
    currentCorrectAnswer = 'high';
  } else if (q.askValue < q.refValue) {
    currentCorrectAnswer = 'low';
  } else {
    currentCorrectAnswer = 'same';
  }

  // Update HUD
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-combo').textContent = combo > 1 ? `🔥 ${combo}コンボ` : '';
  document.getElementById('hud-progress').textContent = `Q${questionNum} / ${TOTAL_QUESTIONS}`;

  // Update question display
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-main-text').textContent = q.question;
  document.getElementById('q-ref-label').textContent = q.refLabel;
  document.getElementById('q-ref-value').textContent = q.refValue + (q.unit || '');
  document.getElementById('q-ask-label').textContent = q.askLabel;
  document.getElementById('q-ask-value').textContent = '？';
  document.getElementById('q-hint').textContent = '💡 ' + q.hint;

  // Reset buttons
  ['high', 'same', 'low'].forEach(a => {
    const btn = document.getElementById('btn-' + a);
    btn.classList.remove('correct', 'wrong');
  });

  // Remove any old answer reveal
  document.querySelectorAll('.answer-reveal').forEach(e => e.remove());

  // Timer
  const timeLimit = getTimeLimit();
  let timeLeft = timeLimit;
  const timerFill = document.getElementById('timer-bar-fill');
  timerFill.style.width = '100%';
  timerFill.style.background = 'var(--accent2)';

  clearInterval(timerInterval);
  clearTimeout(questionTimeout);

  timerInterval = setInterval(() => {
    timeLeft -= 50;
    const pct = Math.max(0, timeLeft / timeLimit * 100);
    timerFill.style.width = pct + '%';
    if (pct < 30) timerFill.style.background = 'var(--fail)';
    else if (pct < 60) timerFill.style.background = 'var(--accent)';
    else timerFill.style.background = 'var(--accent2)';
  }, 50);

  questionTimeout = setTimeout(() => onTimeout(), timeLimit);
}

function handleAnswer(answer) {
  if (!gameActive || !currentCorrectAnswer) return;
  clearTimeout(questionTimeout);
  clearInterval(timerInterval);

  const isCorrect = answer === currentCorrectAnswer;
  const btn = document.getElementById('btn-' + answer);

  // Reveal actual value
  const q = currentQuestion;
  document.getElementById('q-ask-value').textContent = q.askValue + (q.unit || '');

  if (isCorrect) {
    correctCount++;
    combo++;
    if (combo > maxCombo) maxCombo = combo;

    const baseScore = 100;
    const comboBonus = Math.min(combo * 10, 100);
    score += baseScore + comboBonus;

    btn.classList.add('correct');
    showFlash('correct');
    playSE('correct');

    // Show answer
    showAnswerReveal(q, true);

    if (combo > 0 && combo % 5 === 0) {
      showComboPopup(`${combo}コンボ!`);
      playSE('combo');
    } else if (combo === 3) {
      showComboPopup('🔥');
      playSE('combo');
    }

    currentCorrectAnswer = null;
    setTimeout(() => nextQuestion(), 1200);
  } else {
    combo = 0;
    btn.classList.add('wrong');
    document.getElementById('btn-' + currentCorrectAnswer).classList.add('correct');
    showFlash('wrong');
    playSE('wrong');

    showAnswerReveal(q, false);

    currentCorrectAnswer = null;
    setTimeout(() => nextQuestion(), 1500);
  }
}

function onTimeout() {
  clearInterval(timerInterval);
  combo = 0;

  showFlash('wrong');
  playSE('wrong');

  const q = currentQuestion;
  document.getElementById('q-ask-value').textContent = q.askValue + (q.unit || '');
  document.getElementById('btn-' + currentCorrectAnswer).classList.add('correct');
  showAnswerReveal(q, false);

  currentCorrectAnswer = null;
  setTimeout(() => nextQuestion(), 1500);
}

function showAnswerReveal(q, isCorrect) {
  const div = document.createElement('div');
  div.className = 'answer-reveal';
  const symbol = isCorrect ? '⭕' : '❌';
  div.textContent = `${symbol} 笔え: ${q.askValue}${q.unit || ''}`;
  document.getElementById('game-screen').appendChild(div);
  playSE('reveal');
}

function showFlash(type) {
  const div = document.createElement('div');
  div.className = `flash-overlay flash-${type}`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 300);
}

function showComboPopup(text) {
  const div = document.createElement('div');
  div.className = 'combo-popup';
  div.textContent = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 800);
}

async function supabaseFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...options.headers,
    },
  });
  if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ========================================
// RANKING
// ========================================
let currentRankingTab = 'global';

function getLocalRankings() {
  try { return JSON.parse(localStorage.getItem('halRankings') || '[]'); }
  catch { return []; }
}

function getBestScore() {
  const rankings = getLocalRankings();
  return rankings.length > 0 ? Math.max(...rankings.map(r => r.score)) : 0;
}

async function saveScore() {
  initAudio();
  playSE('click');
  const name = document.getElementById('player-name').value.trim() || 'プレイヤー';
  localStorage.setItem('halLastName', name);

  const saveBtn = document.getElementById('save-btn');
  const statusEl = document.getElementById('save-status');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';
  statusEl.textContent = '';

  // localStorage
  const rankings = getLocalRankings();
  rankings.push({
    name, score, correct: correctCount, maxCombo,
    date: new Date().toLocaleDateString('ja-JP'),
  });
  rankings.sort((a, b) => b.score - a.score);
  if (rankings.length > 50) rankings.length = 50;
  localStorage.setItem('halRankings', JSON.stringify(rankings));

  // Supabase
  try {
    await supabaseFetch('high_and_low_scores', {
      method: 'POST',
      prefer: 'return=minimal',
      body: JSON.stringify({
        name,
        score,
        combo: maxCombo,
        questions: correctCount,
      }),
    });
    statusEl.textContent = '✅ グローバルランキングに保存しました！';
    statusEl.style.color = 'var(--success)';
  } catch (e) {
    console.error('Supabase save error:', e);
    statusEl.textContent = '⚠️ オンライン保存に失攗（ローカルには保存済み）';
    statusEl.style.color = 'var(--accent)';
  }

  saveBtn.disabled = false;
  saveBtn.textContent = '保存';
}

function switchRankingTab(tab) {
  currentRankingTab = tab;
  document.getElementById('tab-global').classList.toggle('active', tab === 'global');
  document.getElementById('tab-local').classList.toggle('active', tab === 'local');
  if (tab === 'global') showGlobalRanking();
  else showLocalRanking();
}

function showRanking() {
  showScreen('ranking-screen');
  if (currentRankingTab === 'global') showGlobalRanking();
  else showLocalRanking();
}

async function showGlobalRanking() {
  const list = document.getElementById('ranking-list');
  list.innerHTML = '<div class="ranking-loading"><span class="spinner"></span>読み込み中...</div>';
  try {
    const data = await supabaseFetch('high_and_low_scores?select=name,score,combo,questions,created_at&order=score.desc&limit=50');
    if (!data || data.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:var(--dim);padding:40px">まだ記録がありません</div>';
      return;
    }
    list.innerHTML = data.map((r, i) => {
      const date = r.created_at ? new Date(r.created_at).toLocaleDateString('ja-JP') : '';
      return `
        <div class="ranking-item">
          <div class="rank-num ${i < 3 ? 'rank-' + (i+1) : ''}">${i === 0 ? '👑' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)}</div>
          <div class="rank-name">${escHtml(r.name)}</div>
          <div>
            <div class="rank-score">${r.score}pt</div>
            <div class="rank-date">${r.questions || '?'}問正解 | 🔥${r.combo || 0} | ${date}</div>
          </div>
        </div>`;
    }).join('');
  } catch (e) {
    list.innerHTML = '<div style="text-align:center;color:var(--accent);padding:40px">⚠️ 読み込みに失敗しました<br><small>ローカルランキングをご覧ください</small></div>';
  }
}

function showLocalRanking() {
  const rankings = getLocalRankings();
  const list = document.getElementById('ranking-list');
  if (rankings.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--dim);padding:40px">まだ記録がありません</div>';
    return;
  }
  list.innerHTML = rankings.map((r, i) => `
    <div class="ranking-item">
      <div class="rank-num ${i < 3 ? 'rank-' + (i+1) : ''}">${i === 0 ? '👑' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)}</div>
      <div class="rank-name">${escHtml(r.name)}</div>
      <div>
        <div class="rank-score">${r.score}pt</div>
        <div class="rank-date">${r.correct || '?'}問正解 | ${r.date}</div>
      </div>
    </div>`).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.querySelectorAll('.choice-btn').forEach(btn => {
  btn.addEventListener('click', () => handleAnswer(btn.dataset.answer));
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleAnswer(btn.dataset.answer);
  }, { passive: false });
});

document.addEventListener('keydown', (e) => {
  if (!gameActive) {
    if (e.key === 'Enter' && document.getElementById('title-screen').classList.contains('active')) {
      startGame();
    }
    return;
  }
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A' || e.key === '1') {
    e.preventDefault(); handleAnswer('high');
  } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S' || e.key === '2') {
    e.preventDefault(); handleAnswer('same');
  } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D' || e.key === '3') {
    e.preventDefault(); handleAnswer('low');
  }
});
